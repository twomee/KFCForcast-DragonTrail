services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kfc_forecast
      POSTGRES_USER: kfc
      POSTGRES_PASSWORD: kfc_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kfc -d kfc_forecast"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://kfc:kfc_dev_password@postgres:5432/kfc_forecast
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:8080"]'
      FORECAST_LOOKBACK_DAYS: 14
      FORECAST_RUN_HOUR: 20
      FORECAST_TIMEZONE: Asia/Jerusalem
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
